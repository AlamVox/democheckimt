<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>IEISAT Form Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #222;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
        }

        .form-wrapper {
            position: relative;
            min-height: 650px;
        }

        /* Skeleton Loader */

        .skeleton {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 10;
            padding: 10px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        .skeleton-box {
            height: 20px;
            border-radius: 8px;
            margin-bottom: 18px;
            background: linear-gradient(90deg,
                    #ececec 25%,
                    #f7f7f7 50%,
                    #ececec 75%);

            background-size: 200% 100%;
            animation: loading 1.2s infinite linear;
        }

        .skeleton-box.large {
            height: 50px;
        }

        .skeleton-box.medium {
            width: 70%;
        }

        .skeleton-box.small {
            width: 40%;
        }

        .skeleton-box.button {
            width: 180px;
            height: 50px;
            margin-top: 30px;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        iframe {
            width: 100%;
        }

        @media(max-width:600px) {

            .card {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>IEISAT Registration Form</h1>

            <p>
                Institute Of Education and Innovation
            </p>
            <div
                style="background-color: #e8f4f8; border-left: 4px solid #17a2b8; padding: 15px; margin-bottom: 25px; font-size: 0.9rem; color: #333;">
                <p style="margin-bottom: 5px; font-weight: bold; text-align: left;">Important Instruction:</p>
                <ul style="list-style: lower-roman; padding-left: 30px;">
                    <li style="margin-bottom: 3px;">Name and details must exactly match your Aadhaar Card or Equivalent
                        Document.</li>
                    <li>Fill out the application form carefully. Fields marked with <span
                            style="color:#ff0000;">*</span> are mandatory.</li>
                </ul>
            </div>

            <div class="form-wrapper">

                <!-- Skeleton Loader -->
                <div class="skeleton" id="skeletonLoader">

                    <div class="skeleton-box medium"></div>

                    <div class="skeleton-box large"></div>

                    <div class="skeleton-box medium"></div>

                    <div class="skeleton-box large"></div>

                    <div class="skeleton-box medium"></div>

                    <div class="skeleton-box large"></div>

                    <div class="skeleton-box small"></div>

                    <div class="skeleton-box button"></div>

                </div>

                <!-- Jotform Embed -->
                <script type="text/javascript" src="https://form.jotform.com/jsform/261342671278460"></script>

            </div>

        </div>

    </div>

    <script>

        // Hide skeleton after form loads

        window.addEventListener("load", function () {

            setTimeout(() => {

                const loader =
                    document.getElementById("skeletonLoader");

                if (loader) {
                    loader.style.display = "none";
                }

            }, 2500);

        });

    </script>

</body>

</html>
