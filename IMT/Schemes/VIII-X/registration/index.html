<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTSAT (Class VIII-X)</title>
    <style>
        html,
        body {
            overflow: hidden;
            /* Prevent scrolling entirely */
        }
    </style>
</head>

<body>
    <iframe style="height:99vh; width:100%;" id="ziframe_31154"
        aria-label="School Application Form" frameborder="0"
        src='https://forms.zohopublic.in/imt/form/SchoolApplicationForm/formperma/1kDFK9OM2QkCEtzMPtSdpwem5kGSmqCx7WMKY1nLjMk'>
    </iframe>

    <script type="text/javascript">
        (function () {
            try {
                var zf_frame = document.getElementById("ziframe_31154");
                var ifrmSrc = zf_frame.src;

                if (!((new RegExp("[?&]referrername=")).test(ifrmSrc))) {
                    var rfr = window.location.href;

                    try {
                        rfr = window.self !== window.top ?
                            window.top.location.href :
                            (/^https?:\/\/[\w.-]+\.[a-zA-Z]{2,}/i.test(rfr) ? rfr : "");
                    } catch (e) { }

                    if (rfr && rfr !== "") {
                        if (rfr.length > 1800) {
                            var queryIndex = rfr.indexOf('?');
                            if (queryIndex > -1) {
                                rfr = rfr.substring(0, queryIndex);
                            }
                            if (rfr.length > 1800) {
                                rfr = rfr.substring(0, 1800);
                            }
                        }
                        ifrmSrc += ((ifrmSrc.indexOf('?') > 0) ? '&' : '?') + 'referrername=' + encodeURIComponent(rfr);
                    }
                }
                if (zf_frame.src !== ifrmSrc) {
                    zf_frame.src = ifrmSrc;
                }
            } catch (e) { }
        })();
    </script>

</body>

</html>
